<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声呐采集节点</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .card { border: 1px solid #0f0; padding: 15px; margin-bottom: 10px; }
        input { background: #111; color: #0f0; border: 1px solid #0f0; width: 60px; }
        button { background: #0f0; color: #000; border: none; padding: 10px; width: 100%; cursor: pointer; }
        #status { color: #ff0; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>📡 阵列节点</h2>
    <div class="card">
        <p>设备坐标 (相对中心 mm):</p>
        东西(X): <input type="number" id="posX" value="0"> <br>
        南北(Y): <input type="number" id="posY" value="500"> <br>
        上下(Z): <input type="number" id="posZ" value="0">
    </div>

    <div class="card">
        <button id="initBtn">1. 激活麦克风</button>
        <p id="status">等待授权...</p>
    </div>

    <script>
       let audioContext;
let recorder;
let isRecording = false;

// 1. 注册设备坐标
async function register() {
    const data = {
        x: document.getElementById('posX').value,
        y: document.getElementById('posY').value,
        z: document.getElementById('posZ').value
    };
    await fetch('/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
}

// 2. 轮询指令
async function pollCommand() {
    try {
        const res = await fetch('/poll');
        const cmd = await res.json();
        
        if (cmd.action === "record" && !isRecording) {
            startRecording(cmd.duration);
        }
    } catch (e) { console.error("轮询失败", e); }
}

async function startRecording(duration) {
    isRecording = true;
    document.getElementById('status').innerText = "🔴 正在采集音频...";
    
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mediaRecorder = new MediaRecorder(stream);
    const chunks = [];

    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onstop = async () => {
        const blob = new Blob(chunks, { type: 'audio/wav' });
        const formData = new FormData();
        formData.append('file', blob);
        
        await fetch('/upload', { method: 'POST', body: formData });
        document.getElementById('status').innerText = "✅ 上传完成，等待下一轮";
        isRecording = false;
    };

    mediaRecorder.start();
    setTimeout(() => mediaRecorder.stop(), duration * 1000);
}

document.getElementById('initBtn').onclick = () => {
    register();
    setInterval(pollCommand, 1000); // 每秒检查一次有没有发射指令
    document.getElementById('status').innerText = "📡 已就绪，监听指令中...";
};
    </script>
</body>
</html>
